client_id = "66e33adbae1c3f2f7ae47660446ebbb0"
name = "inventory-auto-sync-v2"
application_url = "https://inventoryautosync.com"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-01"

[[webhooks.subscriptions]]
topics = ["app/scopes_update"]
uri = "/webhooks/app/scopes_update"

[[webhooks.subscriptions]]
topics = ["app/uninstalled"]
uri = "/webhooks/app/uninstalled"

[access_scopes]
scopes = "read_locations,read_products,read_inventory,write_inventory,write_products"
optional_scopes = []
use_legacy_install_flow = false

[auth]
redirect_urls = [
  "https://inventoryautosync.com/auth/callback",
  "https://inventoryautosync.com/api/auth/callback"
]
